<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SaaS Dashboard</title>
    <!-- Import CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>📋 SaaS Task Dashboard</h2>

    <div class="profile-container" onclick="toggleMenu()" style="cursor:pointer">
        👤 Profile
        <div id="profileMenu">
            <a href="/logout">Logout</a>
        </div>
    </div>
</div>

<!-- Wrapper -->
<div class="wrapper">

    <!-- Left Panel -->
    <div class="panel left">
        <h3>Create Task</h3>
        <form method="POST" action="/add_task">
            <label>Task Title</label>
            <input name="title" required>

            <label>Assign Email</label>
            <input name="assigned_email" required>

            <label>Task Time</label>
            <input type="datetime-local" name="task_time" required>

            <button class="add-btn" type="submit">Add Task</button>
        </form>
    </div>

    <!-- Right Panel -->
    <div class="panel right">
        <h3>Tasks</h3>
        {% for task in tasks %}
        <div class="task-card">
            <span class="bell {% if task.task_time <= now %}pulse{% endif %}">🔔</span>

            <b>{{ task.title }}</b><br>
            📧 {{ task.assigned_email }}<br>
            <span class="task-time">⏰ {{ task.task_time.strftime("%d %b %Y %H:%M") }}</span>

            <div class="action-buttons">
                <a href="/edit_task/{{ task.id }}"><button class="edit-btn">Edit</button></a>
                <a href="/delete_task/{{ task.id }}"><button class="delete-btn">Delete</button></a>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

<!-- Import JS -->
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
