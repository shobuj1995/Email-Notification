<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#74ebd5,#acb6e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card Style */
        .container{
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* Title */
        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        /* Input Style */
        input{
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* Button */
        button{
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: #45a049;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    <form method="POST">

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
