<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#74ebd5,#acb6e5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        /* Card Container */
        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            width:400px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        /* Heading */
        h2{
            text-align:center;
            margin-bottom:20px;
        }

        /* Input Style */
        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid #ddd;
            font-size:14px;
        }

        /* Button Style */
        button{
            width:100%;
            padding:12px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#45a049;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Edit Task</h2>

    <form method="POST">

        <label>Task Title</label>
        <input type="text" name="title" value="{{ task.title }}" required>

        <label>Assigned Email</label>
        <input type="email" name="assigned_email" value="{{ task.assigned_email }}" required>

        <label>Task Time</label>
        <input type="datetime-local" name="task_time"
               value="{{ task.task_time.strftime('%Y-%m-%dT%H:%M') }}">

        <button type="submit">Update Task</button>

    </form>

</div>

</body>
</html>
