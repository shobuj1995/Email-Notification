<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#74ebd5,#acb6e5);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            width:450px;
            position:relative;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid #ddd;
        }

        .update-btn{
            width:100%;
            padding:12px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .update-btn:hover{
            background:#45a049;
        }

        .close-btn{
            position:absolute;
            right:15px;
            top:10px;
            font-size:24px;
            border:none;
            background:none;
            cursor:pointer;
            color:#666;
        }

        .close-btn:hover{
            color:red;
        }

    </style>

</head>

<body>

<div class="container">

    <button type="button" class="close-btn" onclick="window.location='/dashboard'">
        &times;
    </button>

    <h2 class="text-center mb-4">Edit Task</h2>

    <form method="POST">

        <label>Task Title</label>
        <input type="text"
               name="title"
               value="{{ task.title }}"
               required>
        <label>Task Description</label>
        <textarea class="form-control mb-3"
                  name="description"
                  placeholder="Enter task description"
                  rows="3">{{ task.description or "" }}</textarea>

        <label>Assigned Emails (Comma separated)</label>
        <input type="text"
               name="assigned_emails"
               value="{{ emails_string }}"
               placeholder="abc@gmail.com, xyz@gmail.com"
               required>

        <label>Task Time</label>
        <input type="datetime-local"
               name="task_time"
               value="{{ task.task_time.strftime('%Y-%m-%dT%H:%M') }}"
               required>

        <button type="submit" class="update-btn">
            Update Task
        </button>

    </form>

</div>

</body>
</html>
